[screen]
width  = 4480
height = 1440

[camera]
id   = 0
flip = true

[mapping]
zone_x_min = 0.15
zone_x_max = 0.85
zone_y_min = 0.10
zone_y_max = 0.90
edge_boost  = 1.8

[smoothing]
landmark_smooth    = 0.3
min_smooth         = 0.05
max_smooth         = 0.35
velocity_scale     = 3.5
cursor_deadzone_px = 2
still_threshold    = 0.0015

[gestures]
pinch_threshold      = 0.05
pinch_cooldown       = 0.4
scroll_deadzone      = 0.010
scroll_speed         = 6.0
flick_min_velocity   = 1.2
flick_window_ms      = 150
flick_axis_ratio     = 2.0
flick_cooldown       = 0.8
fist_minimize_frames = 6
fist_lock_frames     = 12
taskview_hold_frames = 8
taskview_cooldown    = 1.5

[system]
ydotool_socket = /run/user/1000/.ydotool_socket
abs_scale_x = 1.0
abs_scale_y = 1.0
