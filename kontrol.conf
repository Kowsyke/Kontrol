[screen]
width  = 4480
height = 1440

[camera]
id   = 2
flip = true

[camera_tuning]
auto_exposure          = 1
exposure_time_absolute = 300
gain                   = 100
brightness             = 160
contrast               = 130
saturation             = 128
sharpness              = 128
backlight_compensation = 1
power_line_frequency   = 1
focus_autos            = 0
focus_absolute         = 30

[mapping]
zone_x_min = 0.15
zone_x_max = 0.85
zone_y_min = 0.10
zone_y_max = 0.90

[smoothing]
landmark_smooth    = 0.35
min_smooth         = 0.06
max_smooth         = 0.40
velocity_scale     = 4.0
cursor_deadzone_px = 2

[gestures]
pinch_threshold      = 0.055
pinch_cooldown       = 0.35
scroll_deadzone      = 0.010
scroll_speed         = 6.0
palm_hold_frames     = 20
palm_cooldown        = 2.0
tile_move_threshold  = 0.06
tile_window_frames   = 8
tile_cooldown        = 0.8

[system]
ydotool_socket = /run/user/1000/.ydotool_socket
