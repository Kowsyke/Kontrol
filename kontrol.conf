[screen]
width  = 4480
height = 1440

[camera]
id   = 0
flip = true

[camera_tuning]
auto_exposure          = 1
exposure_time_absolute = 300
gain                   = 100
brightness             = 160
contrast               = 130
saturation             = 128
backlight_compensation = 1
power_line_frequency   = 1
focus_autos            = 0
focus_absolute         = 30

[mapping]
zone_x_min = 0.15
zone_x_max = 0.85
zone_y_min = 0.10
zone_y_max = 0.90

[smoothing]
landmark_smooth    = 0.35
min_smooth         = 0.06
max_smooth         = 0.40
velocity_scale     = 4.0
cursor_deadzone_px = 2

[detection]
detection_confidence = 0.50
presence_confidence  = 0.50
tracking_confidence  = 0.50

[gestures]
pinch_threshold        = 0.048
pinch_cooldown         = 0.35
three_finger_threshold = 0.058
three_finger_cooldown  = 1.5
scroll_deadzone        = 0.008
scroll_speed           = 6.0
scroll_vel_alpha       = 0.30
scroll_max_ticks       = 8
palm_cooldown          = 2.0
bunch_threshold        = 0.10
bunch_hold_frames      = 12
tile_move_threshold    = 0.050
tile_cooldown          = 0.8
rotation_threshold       = 1.8
rotation_cooldown        = 0.6
rotation_min_frames      = 8
desktop_swipe_threshold  = 0.08
desktop_swipe_cooldown   = 0.6

[system]
ydotool_socket         = /run/user/1000/.ydotool_socket
headless_notifications = true
